<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Profesional de Diagnóstico DGA</title>

<style>

body{
    font-family:Segoe UI,Arial,sans-serif;
    margin:0;
    background:#f4f6f8;
}

header{
    background:#0f4c81;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:400px 1fr;
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
}

input,textarea{
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    background:#0f4c81;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

canvas{
    width:100%;
    background:white;
    border:1px solid #ccc;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
}

@media(max-width:900px){
.grid{
    grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>

<h1>SISTEMA PROFESIONAL DE DIAGNÓSTICO DGA</h1>

<h2>Ingeniero Darío Cornuz</h2>

</header>

<div class="container">

<div class="grid">

<!-- COLUMNA IZQUIERDA -->

<div>

<div class="card">

<h3>Información del Transformador</h3>

<input id="transformador" placeholder="Transformador">

<input id="serie" placeholder="Número de Serie">

<input id="potencia" placeholder="Potencia MVA">

</div>

<div class="card">

<h3>Cromatografía DGA</h3>

<input id="h2" type="number" placeholder="H2">

<input id="ch4" type="number" placeholder="CH4">

<input id="c2h6" type="number" placeholder="C2H6">

<input id="c2h4" type="number" placeholder="C2H4">

<input id="c2h2" type="number" placeholder="C2H2">

<input id="co" type="number" placeholder="CO">

<input id="co2" type="number" placeholder="CO2">

<button onclick="calcular()">
ANALIZAR
</button>

</div>

<div class="card">

<h3>Resultados</h3>

<p>TDCG: <span id="tdcg">0</span></p>

<p>CO₂/CO: <span id="ratio">0</span></p>

<p>Zona: <span id="zona">Sin evaluar</span></p>

</div>

</div>

<!-- COLUMNA DERECHA -->

<div>

<div class="card">

<h3>Triángulo de Duval</h3>

<canvas id="canvas" width="900" height="700"></canvas>

</div>

<div class="card">

<h3>Resumen</h3>

<div id="resumen">

Esperando análisis.

</div>

</div>

</div>

</div>

</div>

<footer>

© 2026 Ingeniero Darío Cornuz

</footer>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function dibujarTriangulo(){

ctx.clearRect(0,0,900,700);

ctx.beginPath();
ctx.moveTo(450,80);
ctx.lineTo(140,620);
ctx.lineTo(760,620);
ctx.closePath();

ctx.fillStyle="#e8eef5";
ctx.fill();

ctx.lineWidth=3;
ctx.strokeStyle="black";
ctx.stroke();

ctx.font="20px Arial";

ctx.fillStyle="black";

ctx.fillText("C₂H₂",430,60);
ctx.fillText("CH₄",80,650);
ctx.fillText("C₂H₄",770,650);

}

function calcular(){

let h2=Number(document.getElementById("h2").value)||0;
let ch4=Number(document.getElementById("ch4").value)||0;
let c2h6=Number(document.getElementById("c2h6").value)||0;
let c2h4=Number(document.getElementById("c2h4").value)||0;
let c2h2=Number(document.getElementById("c2h2").value)||0;
let co=Number(document.getElementById("co").value)||0;
let co2=Number(document.getElementById("co2").value)||0;

let tdcg=h2+ch4+c2h6+c2h4+c2h2+co;

document.getElementById("tdcg").innerText=tdcg;

let ratio=co===0 ? 0 : co2/co;

document.getElementById("ratio").innerText=
ratio.toFixed(2);

document.getElementById("zona").innerText="PD";

document.getElementById("resumen").innerHTML=
`
TDCG: ${tdcg} ppm<br>
CO₂/CO: ${ratio.toFixed(2)}
`;

}

dibujarTriangulo();

</script>

</body>
</html>

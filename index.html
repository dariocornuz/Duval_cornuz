<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Sistema Profesional de Diagnóstico DGA
</title>

<style>

:root{

--azul:#0f4c81;
--gris:#f4f6f8;
--rojo:#dc3545;
--verde:#198754;
--naranja:#fd7e14;
--amarillo:#ffc107;

}

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:var(--gris);

}

header{

background:var(--azul);
color:white;
padding:30px;
text-align:center;

}

header h1{

margin:0;
font-size:34px;

}

header h2{

margin-top:10px;
font-weight:normal;

}

.autor{

margin-top:15px;
font-size:20px;
font-weight:bold;

}

.container{

max-width:1600px;
margin:auto;
padding:20px;

}

.grid{

display:grid;
grid-template-columns:450px 1fr;
gap:20px;

}

.card{

background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.12);

}

.card h3{

margin-top:0;
color:var(--azul);

}

label{

font-weight:600;
font-size:14px;

}

input,
textarea{

width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:6px;

}

button{

width:100%;
padding:12px;
margin-top:8px;
background:var(--azul);
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;

}

button:hover{

opacity:.9;

}

.canvas-box{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.12);

}

canvas{

width:100%;
background:white;
border:1px solid #ddd;

}

.resultado{

font-size:18px;

}

.riesgo{

padding:10px;
border-radius:6px;
font-weight:bold;
margin-top:10px;

}

.verde{

background:#d1e7dd;
color:#0f5132;

}

.amarillo{

background:#fff3cd;
color:#664d03;

}

.naranja{

background:#ffe5d0;
color:#7a3d00;

}

.rojo{

background:#f8d7da;
color:#842029;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:var(--azul);
color:white;

}

th,
td{

padding:8px;
border:1px solid #ccc;

}

footer{

text-align:center;
padding:30px;
color:#666;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h1>SISTEMA PROFESIONAL DE DIAGNÓSTICO DGA</h1>

<h2>
Análisis Cromatográfico y Triángulo de Duval
para Transformadores de Potencia
</h2>

<div class="autor">

Ingeniero Darío Cornuz

</div>

</header>

<div class="container">

<div class="grid">

<div>
  <div class="card">

<h3>Información del Transformador</h3>

<label>Empresa</label>
<input id="empresa">

<label>Instalación</label>
<input id="instalacion">

<label>Subestación</label>
<input id="subestacion">

<label>Transformador</label>
<input id="transformador">

<label>Fabricante</label>
<input id="fabricante">

<label>Modelo</label>
<input id="modelo">

<label>N° Serie</label>
<input id="serie">

<label>Potencia (MVA)</label>
<input id="potencia">

<label>Tensión Primaria (kV)</label>
<input id="kv1">

<label>Tensión Secundaria (kV)</label>
<input id="kv2">

<label>Fecha de Muestreo</label>
<input id="fecha" type="date">

<label>Responsable</label>
<input id="responsable">

<label>Observaciones</label>
<textarea id="obs" rows="4"></textarea>

</div>

<div class="card">

<h3>Cromatografía DGA (ppm)</h3>

<label>H₂</label>
<input id="h2" type="number" value="0">

<label>CH₄</label>
<input id="ch4" type="number" value="0">

<label>C₂H₆</label>
<input id="c2h6" type="number" value="0">

<label>C₂H₄</label>
<input id="c2h4" type="number" value="0">

<label>C₂H₂</label>
<input id="c2h2" type="number" value="0">

<label>CO</label>
<input id="co" type="number" value="0">

<label>CO₂</label>
<input id="co2" type="number" value="0">

<label>O₂</label>
<input id="o2" type="number" value="0">

<label>N₂</label>
<input id="n2" type="number" value="0">

<button onclick="calcular()">

ANALIZAR MUESTRA

</button>

</div>
<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function dibujarTriangulo(){

ctx.clearRect(0,0,900,700);

const top={x:450,y:80};
const left={x:140,y:620};
const right={x:760,y:620};

/* T3 */

ctx.fillStyle="#ff6b6b";
ctx.beginPath();
ctx.moveTo(620,620);
ctx.lineTo(760,620);
ctx.lineTo(450,420);
ctx.closePath();
ctx.fill();

/* T2 */

ctx.fillStyle="#ffb347";
ctx.beginPath();
ctx.moveTo(450,420);
ctx.lineTo(620,620);
ctx.lineTo(450,620);
ctx.closePath();
ctx.fill();

/* T1 */

ctx.fillStyle="#ffe066";
ctx.beginPath();
ctx.moveTo(280,620);
ctx.lineTo(450,620);
ctx.lineTo(450,420);
ctx.closePath();
ctx.fill();

/* PD */

ctx.fillStyle="#8ce99a";
ctx.beginPath();
ctx.moveTo(140,620);
ctx.lineTo(280,620);
ctx.lineTo(320,500);
ctx.closePath();
ctx.fill();

/* D1 */

ctx.fillStyle="#74c0fc";
ctx.beginPath();
ctx.moveTo(320,500);
ctx.lineTo(450,420);
ctx.lineTo(450,300);
ctx.lineTo(320,350);
ctx.closePath();
ctx.fill();

/* DT */

ctx.fillStyle="#d0bfff";
ctx.beginPath();
ctx.moveTo(320,350);
ctx.lineTo(450,300);
ctx.lineTo(580,350);
ctx.lineTo(450,420);
ctx.closePath();
ctx.fill();

/* D2 */

ctx.fillStyle="#ff8787";
ctx.beginPath();
ctx.moveTo(450,300);
ctx.lineTo(580,350);
ctx.lineTo(450,80);
ctx.closePath();
ctx.fill();

ctx.strokeStyle="black";
ctx.lineWidth=3;

ctx.beginPath();
ctx.moveTo(top.x,top.y);
ctx.lineTo(left.x,left.y);
ctx.lineTo(right.x,right.y);
ctx.closePath();
ctx.stroke();

ctx.fillStyle="black";

ctx.font="bold 18px Arial";

ctx.fillText("PD",220,560);
ctx.fillText("D1",370,410);
ctx.fillText("DT",435,390);
ctx.fillText("D2",500,270);
ctx.fillText("T1",350,580);
ctx.fillText("T2",500,580);
ctx.fillText("T3",660,580);

ctx.fillText("C₂H₂",430,60);
ctx.fillText("CH₄",80,650);
ctx.fillText("C₂H₄",770,650);

}

function calcular(){

let h2=Number(document.getElementById("h2").value)||0;
let ch4=Number(document.getElementById("ch4").value)||0;
let c2h6=Number(document.getElementById("c2h6").value)||0;
let c2h4=Number(document.getElementById("c2h4").value)||0;
let c2h2=Number(document.getElementById("c2h2").value)||0;
let co=Number(document.getElementById("co").value)||0;
let co2=Number(document.getElementById("co2").value)||0;

let totalDuval=ch4+c2h2+c2h4;

if(totalDuval===0){

alert("Ingrese datos DGA");

return;

}

let tdcg=
h2+ch4+c2h6+c2h4+c2h2+co;

document.getElementById("tdcg").innerText=
tdcg.toFixed(0);

let ratio=co===0 ? 0 : (co2/co);

document.getElementById("ratio").innerText=
ratio.toFixed(2);

let zona="PD";
let clasificacion="Descargas Parciales";
let riesgo="BAJO";

let recomendaciones=`
<ul>
<li>Continuar monitoreo periódico.</li>
<li>Comparar resultados históricos.</li>
<li>Evaluar evolución del hidrógeno.</li>
<li>Mantener vigilancia operacional.</li>
</ul>
`;

if(c2h2>30){

zona="D2";
clasificacion="Descargas de Alta Energía";
riesgo="ALTO";

recomendaciones=`
<ul>
<li>Evaluar presencia de arcos internos.</li>
<li>Ejecutar análisis complementarios.</li>
<li>Correlacionar con ensayos eléctricos.</li>
<li>Incrementar frecuencia de monitoreo.</li>
<li>Revisar historial cromatográfico.</li>
<li>Programar inspección especializada.</li>
</ul>
`;

}

else if(c2h4>50){

zona="T3";
clasificacion="Falla Térmica Severa";
riesgo="CRÍTICO";

recomendaciones=`
<ul>
<li>Investigar sobrecalentamientos severos.</li>
<li>Verificar aislamiento sólido.</li>
<li>Evaluar reducción de carga.</li>
<li>Inspeccionar radiadores y enfriamiento.</li>
<li>Implementar monitoreo intensivo.</li>
<li>Considerar intervención programada.</li>
</ul>
`;

}

document.getElementById("zona").innerText=zona;
document.getElementById("clasificacion").innerText=clasificacion;

const riesgoBox=document.getElementById("riesgo");

riesgoBox.className="riesgo";

if(riesgo==="BAJO"){
riesgoBox.classList.add("verde");
}

if(riesgo==="ALTO"){
riesgoBox.classList.add("naranja");
}

if(riesgo==="CRÍTICO"){
riesgoBox.classList.add("rojo");
}

riesgoBox.innerText=
"Nivel de Riesgo: "+riesgo;

document.getElementById("recomendaciones").innerHTML=
recomendaciones;

document.getElementById("resumen").innerHTML=
`
<strong>Resultado:</strong> ${zona}<br><br>

${clasificacion}.<br><br>

TDCG calculado: ${tdcg} ppm.<br><br>

Relación CO₂/CO: ${ratio.toFixed(2)}.
`;

guardarHistorial(zona,tdcg);

dibujarTriangulo();

}

function guardarHistorial(zona,tdcg){

let equipo=
document.getElementById("transformador").value;

let fecha=
document.getElementById("fecha").value;

let historial=
JSON.parse(localStorage.getItem("historialDGA")||"[]");

historial.push({
fecha,
equipo,
zona,
tdcg
});

localStorage.setItem(
"historialDGA",
JSON.stringify(historial)
);

cargarHistorial();

}

function cargarHistorial(){

let historial=
JSON.parse(localStorage.getItem("historialDGA")||"[]");

let html="";

historial.forEach(x=>{

html+=`
<tr>
<td>${x.fecha}</td>
<td>${x.equipo}</td>
<td>${x.zona}</td>
<td>${x.tdcg}</td>
</tr>
`;

});

document.getElementById("tablaHistorial").innerHTML=
html;

}

dibujarTriangulo();
cargarHistorial();

</script>

</body>

</html>
